  <!-- Navigation Mobile Menu -->
  <script>
    (function() {
      'use strict';
      
      const MobileNav = {
        init() {
          this.hamburger = document.getElementById('hamburger');
          this.mobileMenu = document.getElementById('mobileMenu');
          this.mobileClose = document.getElementById('mobileClose');
          this.accordionBtns = document.querySelectorAll('.mobile-accordion-btn');
          
          if (!this.hamburger || !this.mobileMenu) return;
          
          this.attachEvents();
        },
        
        attachEvents() {
          this.hamburger.addEventListener('click', () => this.open());
          this.mobileClose?.addEventListener('click', () => this.close());
          this.mobileMenu.addEventListener('click', (e) => {
            if (e.target === this.mobileMenu) this.close();
          });
          this.accordionBtns.forEach(btn => {
            btn.addEventListener('click', () => this.toggleAccordion(btn));
          });
          this.mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => this.close());
          });
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.mobileMenu.classList.contains('active')) {
              this.close();
            }
          });
        },
        
        open() {
          this.mobileMenu.classList.add('active');
          document.body.style.overflow = 'hidden';
          this.hamburger.setAttribute('aria-expanded', 'true');
        },
        
        close() {
          this.mobileMenu.classList.remove('active');
          document.body.style.overflow = '';
          this.hamburger.setAttribute('aria-expanded', 'false');
        },
        
        toggleAccordion(btn) {
          const content = btn.nextElementSibling;
          const isExpanded = btn.getAttribute('aria-expanded') === 'true';
          
          this.accordionBtns.forEach(otherBtn => {
            if (otherBtn !== btn) {
              otherBtn.setAttribute('aria-expanded', 'false');
              otherBtn.nextElementSibling?.classList.remove('active');
            }
          });
          
          btn.setAttribute('aria-expanded', !isExpanded);
          content?.classList.toggle('active');
        }
      };
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => MobileNav.init());
      } else {
        MobileNav.init();
      }
    })();

  <!-- Social Proof - Notificaciones de compras en tiempo real -->
  <script>
    (function() {
      'use strict';

      const SocialProof = {
        messages: [
          { text: 'Máquina soft comprada en Cali', city: 'Cali' },
          { text: '12 bases MEC3 compradas en Bogotá', city: 'Bogotá' },
          { text: 'Pasta pistacho comprada en Medellín', city: 'Medellín' },
          { text: '5 variegatos comprados en Barranquilla', city: 'Barranquilla' },
          { text: 'Cobertura chocolate comprada en Bucaramanga', city: 'Bucaramanga' },
          { text: 'Toppings comprados en Pereira', city: 'Pereira' },
          { text: 'Máquina artesanal comprada en Cartagena', city: 'Cartagena' },
          { text: 'Base Supergelmix comprada en Cúcuta', city: 'Cúcuta' },
          { text: '8 pastas compradas en Ibagué', city: 'Ibagué' },
          { text: 'Toppings fruta comprados en Santa Marta', city: 'Santa Marta' },
          { text: 'Base Neutralin comprada en Manizales', city: 'Manizales' },
          { text: 'Vitrina comprada en Armenia', city: 'Armenia' },
          { text: '4 salsas especiales compradas en Neiva', city: 'Neiva' },
          { text: 'Máquina soft comprada en Villavicencio', city: 'Villavicencio' },
          { text: 'Bases completas compradas en Pasto', city: 'Pasto' },
          { text: 'Granelas cookies compradas en Popayán', city: 'Popayán' },
          { text: 'Pasta vainilla comprada en Valledupar', city: 'Valledupar' },
          { text: '6 coberturas compradas en Montería', city: 'Montería' },
          { text: 'Toppings premium comprados en Sincelejo', city: 'Sincelejo' }
        ],

        shownMessages: new Set(),
        toast: null,
        toastText: null,

        init() {
          this.toast = document.getElementById('socialProofToast');
          this.toastText = this.toast?.querySelector('.social-proof-text');
          if (!this.toast || !this.toastText) return;

          this.scheduleNext();
        },

        getRandomMessage() {
          const available = this.messages.filter(m => !this.shownMessages.has(m.city));
          if (available.length === 0) {
            this.shownMessages.clear();
            return this.messages[Math.floor(Math.random() * this.messages.length)];
          }
          return available[Math.floor(Math.random() * available.length)];
        },

        getRandomDelay() {
          return Math.floor(Math.random() * 15000) + 20000;
        },

        show(message) {
          this.toastText.textContent = message.text;
          this.toast.classList.add('show');
          this.shownMessages.add(message.city);

          setTimeout(() => {
            this.toast.classList.remove('show');
            this.scheduleNext();
          }, 5000);
        },

        scheduleNext() {
          const delay = this.getRandomDelay();
          setTimeout(() => {
            const message = this.getRandomMessage();
            this.show(message);
          }, delay);
        }
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => SocialProof.init());
      } else {
        SocialProof.init();
      }
    })();
  </script>
