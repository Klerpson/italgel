<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo...</title>
  <meta http-equiv="refresh" content="0;url={{ page.redirect_to }}">
  <script>
    // JavaScript redirect - creates a 303-like behavior
    window.location.replace("{{ page.redirect_to }}");
  </script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .redirect-message {
      text-align: center;
      padding: 2rem;
    }
    a {
      color: #0066cc;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="redirect-message">
    <p>Redirigiendo a: <a href="{{ page.redirect_to }}">{{ page.redirect_to }}</a></p>
    <p>Si no eres redirigido automáticamente, haz clic en el enlace de arriba.</p>
  </div>
</body>
</html>
