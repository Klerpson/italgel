<!-- Organization Schema - E-E-A-T: Authoritativeness -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Italgel Colombia",
    "url": "{{ site.url }}",
    "logo": "{{ site.logo | absolute_url }}",
    "description": "{{ site.description }}",
    "foundingDate": "2008",
    "areaServed": {
      "@type": "Country",
      "name": "Colombia"
    },
    "serviceType": [
      "Distribución de insumos para heladería",
      "Asesoría técnica",
      "Venta de máquinas profesionales"
    ],
    "award": "Distribuidor autorizado MEC3 - The Genuine Company",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "{{ site.telefono }}",
      "contactType": "sales",
      "email": "info@mec3.co",
      "availableLanguage": ["Spanish", "English"]
    },
    "sameAs": [
      "https://www.facebook.com/Mec3.Italgel",
      "https://www.instagram.com/mec3colombia/"
    ]
  }
</script>

{% if page.url == "/" %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Italgel Colombia",
    "description": "Distribuidor de insumos y equipos para heladería profesional en Colombia",
    "url": "{{ site.url }}",
    "telephone": "{{ site.telefono }}",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "CO",
      "streetAddress": "Calle 68 No 68B - 74",
      "addressLocality": "Bogotá"
    },
    "areaServed": ["Bogotá", "Medellín", "Cali", "Barranquilla", "Bucaramanga"]
  }
</script>
{% endif %} {% if page.faqs %}
<!-- FAQPage Schema - E-E-A-T: Trustworthiness -->
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {% for faq in page.faqs %}
      {
        "@type": "Question",
        "name": {{ faq.question | jsonify }},
        "acceptedAnswer": {
          "@type": "Answer",
          "text": {{ faq.answer | strip_html | jsonify }}
        }
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  }
</script>
{% endif %} {% if page.layout == 'post' or page.collection == 'posts' %}
<!-- Article Schema for Blog Posts - E-E-A-T: Expertise -->
{% assign author_id = page.author | default: 'tecnico_italgel' %} {% assign
author = site.data.authors[author_id] %}
<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | escape }}",
    "image": "{{ page.hero | absolute_url | default: site.social_image | absolute_url }}",
    "author": {
      "@type": "Person",
      "name": "{{ author.name }}",
      "jobTitle": "{{ author.title }}",
      "knowsAbout": {{ author.knowsAbout | jsonify }}
    },
    "publisher": {
      "@type": "Organization",
      "name": "Italgel Colombia",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.logo | absolute_url }}"
      }
    },
    "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date: '%Y-%m-%d' }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
</script>
{% endif %}
